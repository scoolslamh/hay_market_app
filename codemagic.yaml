workflows:
  ios-workflow:
    name: iOS Build Fixed
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Flutter clean
        script: flutter clean

      - name: Install packages
        script: flutter pub get

      - name: Install pods manually
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS
        script: flutter build ios --release --no-codesign